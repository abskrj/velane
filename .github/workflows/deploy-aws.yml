name: Deploy to AWS

on:
  workflow_run:
    workflows: ["Build and Push Docker Images"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (semver or sha-abc1234). Defaults to tag at HEAD."
        required: false
        type: string

concurrency:
  group: deploy-aws
  cancel-in-progress: false

jobs:
  deploy:
    if: >
      (github.event_name == 'workflow_dispatch') ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push')
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      TOFU_DIR: infra/terraform/k8s
      IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0

      - name: Resolve image tag
        id: image
        env:
          DEPLOY_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            TAG="${{ github.event.inputs.image_tag }}"
          else
            git fetch --tags --force
            if TAG=$(git describe --tags --exact-match 2>/dev/null); then
              TAG="${TAG#v}"
            else
              TAG="sha-${DEPLOY_SHA:0:7}"
            fi
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Deploying Velane images tagged: $TAG"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Configure kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region "${{ secrets.AWS_REGION }}" \
            --name "${{ secrets.EKS_CLUSTER_NAME }}" \
            --alias "${{ secrets.EKS_CLUSTER_NAME }}"

      - name: Install OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.9.0

      - name: Prepare terraform.tfvars
        env:
          K8S_TFVARS: ${{ secrets.K8S_TFVARS }}
        run: |
          printf '%s\n' "$K8S_TFVARS" > "$TOFU_DIR/terraform.tfvars"
          bash infra/scripts/ci-prepare-k8s-tfvars.sh \
            "$TOFU_DIR/terraform.tfvars" \
            "$IMAGE_REGISTRY" \
            "${{ steps.image.outputs.tag }}" \
            "/home/runner/.kube/config" \
            "${{ secrets.EKS_CLUSTER_NAME }}"

      - name: OpenTofu init
        working-directory: ${{ env.TOFU_DIR }}
        run: |
          tofu init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=k8s/terraform.tfstate" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_STATE_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      - name: OpenTofu apply
        working-directory: ${{ env.TOFU_DIR }}
        run: tofu apply -auto-approve
