version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: runeforge
      POSTGRES_PASSWORD: runeforge
      POSTGRES_DB: runeforge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U runeforge -d runeforge"]
      interval: 5s
      timeout: 5s
      retries: 10

  bun-executor:
    build:
      context: ./services/executor-runtime/bun
    ports:
      - "8081:8080"
    restart: unless-stopped

  python-executor:
    build:
      context: ./services/executor-runtime/python
    ports:
      - "8082:8080"
    restart: unless-stopped

  control-plane:
    build:
      context: ./services/control-plane
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://runeforge:runeforge@postgres:5432/runeforge
      BUN_EXECUTOR_URL: http://bun-executor:8080
      PYTHON_EXECUTOR_URL: http://python-executor:8080
      PORT: "8080"
    depends_on:
      postgres:
        condition: service_healthy
      bun-executor:
        condition: service_started
      python-executor:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
