server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location /api/ {
    proxy_pass http://control-plane:8080/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}

# Proxy for the Nango Connect UI (port 3009).
# The @nangohq/frontend SDK opens an iframe to NANGO_PUBLIC_CONNECT_URL.
server {
  listen 3009;
  server_name _;

  location / {
    proxy_pass http://nango:3009/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}

# Proxy for the Nango API server (port 3003).
# The Connect UI iframe makes API calls to this origin. Keeping it on its own
# port avoids path-prefix issues — new URL('/connect/session', origin) works
# correctly when the origin has no path component.
server {
  listen 3003;
  server_name _;

  location / {
    proxy_pass http://nango:3003/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}
